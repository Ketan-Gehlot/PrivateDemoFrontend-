services:
  - type: web
    name: koinx-tax-loss-api
    runtime: node
    plan: free
    rootDir: apps/api
    buildCommand: npm install && npm run db:generate && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: COINGECKO_API_KEY
        sync: false
      - key: WEB_URL
        sync: false
